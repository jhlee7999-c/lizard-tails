<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lizard.io Prototype</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a2e1a;
            font-family: 'Pretendard', sans-serif;
            color: white;
            user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .score-board { font-size: 24px; font-weight: bold; color: #55aa55; }
        .stats { font-size: 14px; opacity: 0.8; margin-top: 5px; }

        #minimap-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 10;
        }
        #minimap { width: 100%; height: 100%; }

        #boost-btn {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 80px;
            height: 80px;
            background: rgba(85, 170, 85, 0.4);
            border: 3px solid #55aa55;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            pointer-events: auto;
            cursor: pointer;
            z-index: 20;
            transition: transform 0.1s;
        }
        #boost-btn:active { background: rgba(85, 170, 85, 0.7); transform: scale(0.9); }

        #game-over {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #game-over h1 { font-size: 60px; color: #ff6b6b; margin-bottom: 10px; }
        #game-over p { font-size: 24px; margin-bottom: 30px; }
        #restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #55aa55;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        #flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: red;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
        }

        #joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: none;
            pointer-events: none;
            z-index: 15;
            transform: translate(-50%, -50%);
        }
        #joystick-knob {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score-board">Score: <span id="score">0</span></div>
        <div class="stats">Length: <span id="length">20</span> | Time: <span id="time">00:00</span></div>
    </div>

    <div id="minimap-container">
        <canvas id="minimap"></canvas>
    </div>

    <div id="boost-btn">BOOST</div>
    
    <div id="joystick-base">
        <div id="joystick-knob"></div>
    </div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn">Restart</button>
    </div>

    <div id="flash"></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- CONSTANTS ---
        const WORLD_SIZE = 3000;
        const INITIAL_SEGMENTS = 20;
        const SEGMENT_SPACING = 8;
        const BASE_SPEED = 2.4; // Reduced by 20% from 3
        const BOOST_SPEED = 4.8; // Reduced by 20% from 6
        const ROTATION_SPEED = 0.08;
        const BASE_SIZE = 12;
        const FOOD_COUNT = 150;
        const COLORS = ['#ffdd57', '#ff6b6b', '#48dbfb', '#ff9ff3', '#54a0ff'];

        // --- GLOBALS ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const miniCanvas = document.getElementById('minimap');
        const miniCtx = miniCanvas.getContext('2d');
        const flashEl = document.getElementById('flash');
        const joystickBase = document.getElementById('joystick-base');
        const joystickKnob = document.getElementById('joystick-knob');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let isBoosting = false;
        let gameActive = true;
        let startTime = Date.now();
        let particles = [];
        let floatingTexts = [];

        // Touch Control Variables
        let isTouching = false;
        let touchStartX = 0, touchStartY = 0;
        let touchMoveX = 0, touchMoveY = 0;

        // --- UTILS ---
        const dist = (x1, y1, x2, y2) => Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);

        // --- CLASSES ---
        class Food {
            constructor(x, y, value = 1, color = null) {
                this.x = x || Math.random() * WORLD_SIZE;
                this.y = y || Math.random() * WORLD_SIZE;
                this.radius = value === 1 ? 5 : 8;
                this.value = value;
                this.color = color || COLORS[Math.floor(Math.random() * COLORS.length)];
                this.pulseTime = Math.random() * Math.PI * 2;
            }

            draw(ctx, time) {
                const pulse = 0.9 + Math.sin(time * 0.005 + this.pulseTime) * 0.1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * pulse, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }
        }

        class Lizard {
            constructor(x, y, color, isBot = false) {
                this.x = x;
                this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = BASE_SPEED;
                this.score = 0;
                this.color = color;
                this.segments = []; 
                this.targetLength = INITIAL_SEGMENTS;
                this.baseSize = BASE_SIZE;
                this.invincible = false;
                this.isBot = isBot;
                this.id = Math.random();
                this.boostTimer = 0;

                for (let i = 0; i < INITIAL_SEGMENTS; i++) {
                    this.segments.push({ x, y });
                }
            }

            update(targetX, targetY, deltaTime) {
                if (this.invincible) {
                    this.blink = Math.floor(Date.now() / 100) % 2 === 0;
                } else {
                    this.blink = false;
                }

                // Movement Logic
                const dx = targetX - this.x;
                const dy = targetY - this.y;
                const targetAngle = Math.atan2(dy, dx);
                let diff = targetAngle - this.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                this.angle += diff * ROTATION_SPEED;

                const boosting = isBoosting && !this.isBot && this.segments.length > 8;
                this.speed = boosting ? BOOST_SPEED : BASE_SPEED;

                if (boosting) {
                    this.boostTimer += deltaTime;
                    if (this.boostTimer > 500) {
                        this.targetLength = Math.max(8, this.targetLength - 1);
                        this.boostTimer = 0;
                    }
                }

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                this.segments.unshift({ x: this.x, y: this.y });
                if (this.segments.length > this.targetLength) {
                    this.segments.pop();
                }

                if (this.x < 0 || this.x > WORLD_SIZE || this.y < 0 || this.y > WORLD_SIZE) {
                    if (!this.isBot) gameOver();
                    else this.die();
                }
            }

            draw(ctx, time) {
                if (this.blink) ctx.globalAlpha = 0.3;

                const boosting = isBoosting && !this.isBot && this.speed > BASE_SPEED;
                if (boosting) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "#ffffff";
                }

                // Draw Body (Back to Front)
                for (let i = this.segments.length - 1; i >= 0; i--) {
                    const seg = this.segments[i];
                    const progress = i / this.segments.length;
                    
                    // Thicker body, sharper tail tip
                    let radius;
                    if (i === 0) radius = this.baseSize * 1.5;
                    else if (progress < 0.8) radius = this.baseSize; // Maintain thickness
                    else radius = this.baseSize * Math.max(0.1, (1 - (progress - 0.8) / 0.2) * 1.0); // Sharp tip

                    if (i === 0) {
                        // Lizard Head Shape
                        ctx.save();
                        ctx.translate(seg.x, seg.y);
                        ctx.rotate(this.angle);
                        
                        ctx.beginPath();
                        // Slightly elongated head
                        ctx.ellipse(this.baseSize * 0.4, 0, radius * 1.1, radius, 0, 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.fill();
                        ctx.closePath();

                        // Eyes
                        ctx.fillStyle = "white";
                        ctx.beginPath();
                        ctx.arc(radius * 0.7, -radius * 0.4, radius * 0.3, 0, Math.PI * 2);
                        ctx.arc(radius * 0.7, radius * 0.4, radius * 0.3, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = "black";
                        ctx.beginPath();
                        ctx.arc(radius * 0.85, -radius * 0.4, radius * 0.15, 0, Math.PI * 2);
                        ctx.arc(radius * 0.85, radius * 0.4, radius * 0.15, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.restore();
                    } else {
                        // Scale Patterns (Every 3rd segment)
                        if (i % 3 === 0 && i < this.segments.length * 0.7) {
                            ctx.beginPath();
                            ctx.arc(seg.x, seg.y, radius * 1.1, 0, Math.PI * 2);
                            ctx.strokeStyle = "rgba(0,0,0,0.2)";
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        }

                        // Leg Animation (4 legs at front area)
                        const legSpots = [6, 14]; // Pairs at these segments
                        if (legSpots.includes(i)) {
                            this.drawLegPair(ctx, seg, i, radius, time);
                        }

                        ctx.beginPath();
                        ctx.arc(seg.x, seg.y, radius, 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.fill();
                        ctx.closePath();
                    }
                }
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1.0;
            }

            drawLegPair(ctx, seg, index, radius, time) {
                const speedFactor = this.speed / BASE_SPEED;
                const oscillation = Math.sin(time * 0.01 * speedFactor + index) * 6;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 4;
                ctx.lineCap = "round";
                
                const legAngle = this.angle + Math.PI/2;
                const legLen = radius + 8 + oscillation;
                
                // Left & Right Legs
                [1, -1].forEach(side => {
                    const currentAngle = this.angle + (side * Math.PI/2) + (oscillation * 0.05);
                    ctx.beginPath();
                    ctx.moveTo(seg.x, seg.y);
                    // Two joints for a more "lizard" leg look
                    const elbowX = seg.x + Math.cos(currentAngle) * (radius + 4);
                    const elbowY = seg.y + Math.sin(currentAngle) * (radius + 4);
                    const footX = elbowX + Math.cos(currentAngle + (side * 0.5)) * 8;
                    const footY = elbowY + Math.sin(currentAngle + (side * 0.5)) * 8;
                    
                    ctx.lineTo(elbowX, elbowY);
                    ctx.lineTo(footX, footY);
                    ctx.stroke();
                });
            }

            die() {
                this.segments.forEach(seg => {
                    foods.push(new Food(seg.x, seg.y, 1, this.color));
                });
                if (this.isBot) {
                    bots = bots.filter(b => b.id !== this.id);
                    setTimeout(() => bots.push(new Lizard(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, COLORS[Math.floor(Math.random()*COLORS.length)], true)), 2000);
                }
            }

            onCollision() {
                if (this.invincible) return;
                if (this.segments.length <= 8) {
                    if (!this.isBot) gameOver();
                    else this.die();
                    return;
                }
                const cutLength = Math.floor(this.segments.length / 2);
                const removed = this.segments.splice(this.segments.length - cutLength, cutLength);
                removed.forEach(seg => {
                    foods.push(new Food(seg.x, seg.y, 2, this.color));
                    spawnParticles(seg.x, seg.y, this.color);
                });
                this.targetLength = this.segments.length;
                this.score = Math.floor(this.score / 2);
                this.invincible = true;
                if (!this.isBot) triggerFlash();
                setTimeout(() => this.invincible = false, 1500);
            }
        }

        // --- GAME ENGINE ---
        let player = new Lizard(WORLD_SIZE / 2, WORLD_SIZE / 2, '#55aa55');
        let foods = [];
        let bots = [];

        function init() {
            foods = [];
            for (let i = 0; i < FOOD_COUNT; i++) foods.push(new Food());
            bots = [];
            for (let i = 0; i < 5; i++) bots.push(new Lizard(Math.random() * WORLD_SIZE, Math.random() * WORLD_SIZE, COLORS[i], true));

            window.addEventListener('resize', resize);
            resize();

            // Desktop Mouse
            window.addEventListener('mousemove', e => {
                if (!isTouching) {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                }
            });

            // Mobile Touch Joystick
            window.addEventListener('touchstart', e => {
                if (e.target.id === 'boost-btn') return;
                isTouching = true;
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                
                joystickBase.style.display = 'block';
                joystickBase.style.left = touchStartX + 'px';
                joystickBase.style.top = touchStartY + 'px';
                updateJoystickKnob(0, 0);
            }, { passive: false });

            window.addEventListener('touchmove', e => {
                if (!isTouching) return;
                const touch = e.touches[0];
                touchMoveX = touch.clientX - touchStartX;
                touchMoveY = touch.clientY - touchStartY;
                
                const limit = 50;
                const distance = Math.sqrt(touchMoveX**2 + touchMoveY**2);
                if (distance > limit) {
                    touchMoveX = (touchMoveX / distance) * limit;
                    touchMoveY = (touchMoveY / distance) * limit;
                }
                
                updateJoystickKnob(touchMoveX, touchMoveY);
                // Translate relative movement to screen coordinates for target
                mouseX = width / 2 + touchMoveX * 5; 
                mouseY = height / 2 + touchMoveY * 5;
            }, { passive: false });

            window.addEventListener('touchend', e => {
                isTouching = false;
                joystickBase.style.display = 'none';
            });

            function updateJoystickKnob(x, y) {
                joystickKnob.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            }

            window.addEventListener('keydown', e => { if (e.code === 'Space') isBoosting = true; });
            window.addEventListener('keyup', e => { if (e.code === 'Space') isBoosting = false; });

            const boostBtn = document.getElementById('boost-btn');
            boostBtn.addEventListener('touchstart', e => { e.stopPropagation(); isBoosting = true; }, { passive: false });
            boostBtn.addEventListener('touchend', () => isBoosting = false);

            document.getElementById('restart-btn').onclick = () => location.reload();
            requestAnimationFrame(loop);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            miniCanvas.width = 100;
            miniCanvas.height = 100;
        }

        function spawnParticles(x, y, color) {
            for (let i = 0; i < 5; i++) particles.push({ x, y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4, life: 1.0, color });
        }

        function spawnFloatingText(x, y, text) { floatingTexts.push({ x, y, text, life: 1.0 }); }

        function triggerFlash() { flashEl.style.opacity = '0.3'; setTimeout(() => flashEl.style.opacity = '0', 500); }

        function checkCollision(head, segments) {
            for (let i = 0; i < segments.length; i++) {
                if (dist(head.x, head.y, segments[i].x, segments[i].y) < 15) return true;
            }
            return false;
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-score').innerText = player.score;
        }

        let lastTime = Date.now();
        function loop() {
            if (!gameActive) return;
            const now = Date.now();
            const dt = now - lastTime;
            lastTime = now;

            const targetX = player.x + (mouseX - width / 2);
            const targetY = player.y + (mouseY - height / 2);
            player.update(targetX, targetY, dt);

            bots.forEach(bot => {
                let target = { x: WORLD_SIZE/2, y: WORLD_SIZE/2 };
                let minFDist = 500;
                foods.forEach(f => {
                    const d = dist(bot.x, bot.y, f.x, f.y);
                    if (d < minFDist) { minFDist = d; target = f; }
                });
                if (dist(bot.x, bot.y, player.x, player.y) < 200) {
                    const angle = Math.atan2(bot.y - player.y, bot.x - player.x);
                    target = { x: bot.x + Math.cos(angle)*100, y: bot.y + Math.sin(angle)*100 };
                }
                if (bot.x < 100 || bot.x > WORLD_SIZE-100 || bot.y < 100 || bot.y > WORLD_SIZE-100) target = { x: WORLD_SIZE/2, y: WORLD_SIZE/2 };
                bot.update(target.x, target.y, dt);
            });

            [player, ...bots].forEach(liz => {
                const head = liz.segments[0];
                for (let i = foods.length - 1; i >= 0; i--) {
                    const f = foods[i];
                    if (dist(head.x, head.y, f.x, f.y) < (liz.baseSize * 1.5 + f.radius)) {
                        liz.score += f.value;
                        liz.targetLength += f.value === 1 ? 1 : 2;
                        foods.splice(i, 1);
                        foods.push(new Food());
                        if (liz === player) { spawnParticles(f.x, f.y, f.color); spawnFloatingText(f.x, f.y, "+1"); }
                    }
                }
            });

            const all = [player, ...bots];
            all.forEach(liz => {
                const head = liz.segments[0];
                all.forEach(other => {
                    if (liz === other) return;
                    if (checkCollision(head, other.segments)) liz.onCollision();
                });
            });

            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; });
            particles = particles.filter(p => p.life > 0);
            floatingTexts.forEach(t => { t.y -= 1; t.life -= 0.02; });
            floatingTexts = floatingTexts.filter(t => t.life > 0);

            ctx.fillStyle = '#1a2e1a';
            ctx.fillRect(0, 0, width, height);
            ctx.save();
            ctx.translate(width / 2 - player.x, height / 2 - player.y);

            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= WORLD_SIZE; x += 100) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_SIZE); ctx.stroke(); }
            for (let y = 0; y <= WORLD_SIZE; y += 100) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WORLD_SIZE, y); ctx.stroke(); }

            ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 5;
            const dBorder = Math.min(player.x, WORLD_SIZE - player.x, player.y, WORLD_SIZE - player.y);
            ctx.globalAlpha = dBorder < 100 ? 1.0 : 0.3;
            ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE); ctx.globalAlpha = 1.0;

            foods.forEach(f => f.draw(ctx, now));
            bots.forEach(b => b.draw(ctx, now));
            player.draw(ctx, now);

            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3); });
            floatingTexts.forEach(t => { ctx.globalAlpha = t.life; ctx.fillStyle = "white"; ctx.font = "bold 16px sans-serif"; ctx.fillText(t.text, t.x, t.y); });
            ctx.globalAlpha = 1.0;
            ctx.restore();

            document.getElementById('score').innerText = player.score;
            document.getElementById('length').innerText = player.segments.length;
            const elapsed = Math.floor((now - startTime) / 1000);
            const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const secs = String(elapsed % 60).padStart(2, '0');
            document.getElementById('time').innerText = `${mins}:${secs}`;

            miniCtx.fillStyle = 'rgba(0,0,0,0.5)';
            miniCtx.fillRect(0, 0, 100, 100);
            const s = 100 / WORLD_SIZE;
            miniCtx.fillStyle = 'white'; foods.forEach(f => miniCtx.fillRect(f.x*s, f.y*s, 1, 1));
            miniCtx.fillStyle = 'red'; bots.forEach(b => miniCtx.fillRect(b.x*s, b.y*s, 2, 2));
            miniCtx.fillStyle = '#00ff00'; miniCtx.fillRect(player.x*s, player.y*s, 3, 3);
            miniCtx.strokeStyle = 'white'; miniCtx.strokeRect((player.x - width/2)*s, (player.y - height/2)*s, width*s, height*s);

            requestAnimationFrame(loop);
        }
        init();
    </script>
</body>
</html>
