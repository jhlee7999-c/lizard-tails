<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lizard.io Refined</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d1a0d;
            font-family: 'Pretendard', sans-serif;
            color: white;
            user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .score-board { font-size: 28px; font-weight: 800; color: #78e08f; }
        .stats { font-size: 14px; opacity: 0.8; margin-top: 5px; font-weight: 400; letter-spacing: 1px; }

        #minimap-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 110px;
            height: 110px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(120, 224, 143, 0.3);
            border-radius: 10px;
            z-index: 10;
            overflow: hidden;
        }
        #minimap { width: 100%; height: 100%; }

        #boost-btn {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 80px;
            height: 80px;
            background: rgba(120, 224, 143, 0.2);
            border: 3px solid #78e08f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #78e08f;
            pointer-events: auto;
            cursor: pointer;
            z-index: 50;
            transition: all 0.1s;
            box-shadow: 0 0 15px rgba(120, 224, 143, 0.2);
        }
        #boost-btn:active { background: rgba(120, 224, 143, 0.6); transform: scale(0.9); }

        #game-over {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #restart-btn {
            padding: 18px 50px;
            font-size: 22px;
            background: #78e08f;
            border: none;
            color: #0d1a0d;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 800;
        }

        #joystick-base {
            position: absolute;
            width: 100px; /* Reduced from 140 */
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(120, 224, 143, 0.2);
            border-radius: 50%;
            display: none;
            pointer-events: none;
            z-index: 15;
            transform: translate(-50%, -50%);
        }
        #joystick-knob {
            position: absolute;
            width: 40px; /* Reduced from 60 */
            height: 40px;
            background: rgba(120, 224, 143, 0.4);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score-board">Lizard.io</div>
        <div class="stats">Score: <span id="score">0</span> | Length: <span id="length">25</span> | Time: <span id="time">00:00</span></div>
    </div>

    <div id="minimap-container">
        <canvas id="minimap"></canvas>
    </div>

    <div id="boost-btn">BOOST</div>
    
    <div id="joystick-base">
        <div id="joystick-knob"></div>
    </div>

    <div id="game-over">
        <h1 style="font-size: 72px; color: #ff6b6b; font-weight: 900;">EXTINCT!</h1>
        <p style="font-size: 28px; margin-bottom: 30px;">Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn">Try Again</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- CONSTANTS ---
        const WORLD_SIZE = 3000;
        const INITIAL_SEGMENTS = 25;
        const SEGMENT_SPACING = 6;
        const BASE_SPEED = 2.4; 
        const BOOST_SPEED = 5.0; 
        const ROTATION_SPEED = 0.09;
        const BASE_SIZE = 14;
        const FOOD_COUNT = 150;
        const COLORS = ['#78e08f', '#60a3bc', '#fa983a', '#eb2f06', '#f6b93b', '#b8e994'];

        // --- GLOBALS ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const miniCanvas = document.getElementById('minimap');
        const miniCtx = miniCanvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let isBoosting = false;
        let gameActive = true;
        let startTime = Date.now();
        let particles = [];
        let dustParticles = [];

        // Multi-touch tracking
        let activeTouches = {}; // { identifier: {startX, startY, type: 'joystick'|'boost'} }
        let joystickTouchId = null;

        // --- UTILS ---
        const dist = (x1, y1, x2, y2) => Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);

        // --- CLASSES ---
        class Food {
            constructor(x, y, value = 1, color = null) {
                this.x = x || Math.random() * WORLD_SIZE;
                this.y = y || Math.random() * WORLD_SIZE;
                this.radius = value === 1 ? 6 : 10;
                this.value = value;
                this.color = color || COLORS[Math.floor(Math.random() * COLORS.length)];
                this.pulseTime = Math.random() * Math.PI * 2;
            }
            draw(ctx, time) {
                const pulse = 0.9 + Math.sin(time * 0.004 + this.pulseTime) * 0.15;
                const r = this.radius * pulse;
                ctx.globalAlpha = 0.2;
                ctx.beginPath(); ctx.arc(this.x, this.y, r * 2, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill();
                ctx.globalAlpha = 1.0;
                const grad = ctx.createRadialGradient(this.x, this.y - r*0.3, 0, this.x, this.y, r);
                grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.3, this.color); grad.addColorStop(1, 'rgba(0,0,0,0.3)');
                ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill(); ctx.closePath();
            }
        }

        class Lizard {
            constructor(x, y, color, isBot = false) {
                this.x = x; this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = BASE_SPEED;
                this.score = 0;
                this.color = color;
                this.segments = []; 
                this.targetLength = INITIAL_SEGMENTS;
                this.baseSize = BASE_SIZE;
                this.invincible = false;
                this.isBot = isBot;
                this.id = Math.random();
                this.boostTimer = 0;
                for (let i = 0; i < INITIAL_SEGMENTS; i++) this.segments.push({ x, y });
            }

            update(targetX, targetY, deltaTime) {
                this.blink = this.invincible ? (Math.floor(Date.now() / 80) % 2 === 0) : false;
                const dx = targetX - this.x;
                const dy = targetY - this.y;
                const targetAngle = Math.atan2(dy, dx);
                let diff = targetAngle - this.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                this.angle += diff * ROTATION_SPEED;

                const boosting = isBoosting && !this.isBot && this.segments.length > 10;
                this.speed = boosting ? BOOST_SPEED : BASE_SPEED;

                if (boosting) {
                    this.boostTimer += deltaTime;
                    if (this.boostTimer > 400) {
                        this.targetLength = Math.max(10, this.targetLength - 1);
                        this.boostTimer = 0;
                        spawnParticles(this.segments[this.segments.length-1].x, this.segments[this.segments.length-1].y, this.color, 1);
                    }
                }

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                this.segments.unshift({ x: this.x, y: this.y });
                if (this.segments.length > this.targetLength) this.segments.pop();

                if (this.x < 0 || this.x > WORLD_SIZE || this.y < 0 || this.y > WORLD_SIZE) {
                    if (!this.isBot) gameOver(); else this.die();
                }
            }

            draw(ctx, time) {
                if (this.blink) ctx.globalAlpha = 0.4;
                const boosting = isBoosting && !this.isBot && this.speed > BASE_SPEED;
                
                for (let i = this.segments.length - 1; i >= 0; i--) {
                    const seg = this.segments[i];
                    const progress = i / this.segments.length;
                    
                    let radius;
                    if (i === 0) radius = this.baseSize * 1.5;
                    else if (progress < 0.6) radius = this.baseSize; 
                    else radius = this.baseSize * Math.max(0.2, Math.pow(1 - (progress - 0.6) / 0.4, 0.7)); 

                    if (i === 0) {
                        ctx.save();
                        ctx.translate(seg.x, seg.y); ctx.rotate(this.angle);
                        ctx.beginPath();
                        ctx.ellipse(this.baseSize * 0.4, 0, radius * 1.2, radius, 0, 0, Math.PI * 2);
                        const hGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, radius * 1.5);
                        hGrad.addColorStop(0, this.color); hGrad.addColorStop(1, this.darkenColor(this.color, 30));
                        ctx.fillStyle = hGrad; ctx.fill();
                        
                        // Eyes
                        const drawEye = (side) => {
                            ctx.save(); ctx.translate(radius*0.7, side * radius*0.5);
                            ctx.fillStyle = "white"; ctx.beginPath(); ctx.ellipse(0, 0, radius*0.35, radius*0.25, 0, 0, Math.PI*2); ctx.fill();
                            ctx.fillStyle = "black"; ctx.beginPath(); ctx.ellipse(radius*0.1, 0, radius*0.15, radius*0.2, 0, 0, Math.PI*2); ctx.fill();
                            ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.beginPath(); ctx.arc(radius*0.05, -radius*0.05, radius*0.05, 0, Math.PI*2); ctx.fill();
                            ctx.restore();
                        };
                        drawEye(1); drawEye(-1);
                        ctx.restore();
                    } else {
                        // Crawling Legs: Diagonal pairs move together
                        const legSpots = [Math.floor(this.targetLength * 0.15), Math.floor(this.targetLength * 0.4)];
                        if (legSpots.includes(i)) {
                            this.drawAlternatingLegs(ctx, seg, i, radius, time);
                        }

                        const grad = ctx.createRadialGradient(seg.x - radius*0.2, seg.y - radius*0.2, 0, seg.x, seg.y, radius);
                        grad.addColorStop(0, this.color); grad.addColorStop(1, this.darkenColor(this.color, 20));
                        ctx.beginPath(); ctx.arc(seg.x, seg.y, radius, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill();

                        if (boosting) {
                            ctx.save();
                            ctx.globalAlpha = 0.4; ctx.strokeStyle = "white"; ctx.lineWidth = 4;
                            ctx.shadowBlur = 10; ctx.shadowColor = "white";
                            ctx.beginPath(); ctx.arc(seg.x, seg.y, radius + 2, 0, Math.PI*2); ctx.stroke();
                            ctx.restore();
                        }
                    }
                }
                ctx.globalAlpha = 1.0;
            }

            drawAlternatingLegs(ctx, seg, index, radius, time) {
                const speedFactor = this.speed / BASE_SPEED;
                // Crawling logic: front-left/back-right pair (Group A), front-right/back-left pair (Group B)
                const cycle = time * 0.008 * speedFactor;
                
                ctx.strokeStyle = this.color;
                ctx.lineWidth = radius * 0.45;
                ctx.lineCap = "round";
                
                [1, -1].forEach(side => {
                    // Determine phase: Group A (1, spot 1 & -1, spot 2) vs Group B
                    // index 0.15 spot is "front", 0.4 spot is "back"
                    const isFront = index < this.targetLength * 0.25;
                    const phaseOffset = (isFront ? (side === 1 ? 0 : Math.PI) : (side === 1 ? Math.PI : 0));
                    const swing = Math.sin(cycle + phaseOffset);
                    
                    const baseAngle = this.angle + (side * Math.PI/2.2);
                    const dynamicAngle = baseAngle + (swing * side * 0.6);
                    
                    const thighLen = radius * 0.9;
                    const shinLen = radius * 0.8;
                    const elbowX = seg.x + Math.cos(dynamicAngle) * thighLen;
                    const elbowY = seg.y + Math.sin(dynamicAngle) * thighLen;
                    const footAngle = dynamicAngle + (side * 0.7);
                    const footX = elbowX + Math.cos(footAngle) * shinLen;
                    const footY = elbowY + Math.sin(footAngle) * shinLen;
                    
                    ctx.beginPath(); ctx.moveTo(seg.x, seg.y); ctx.lineTo(elbowX, elbowY); ctx.lineTo(footX, footY); ctx.stroke();
                    
                    // Claws
                    ctx.save(); ctx.lineWidth = 2; ctx.strokeStyle = "rgba(0,0,0,0.3)";
                    for(let a = -0.4; a <= 0.4; a += 0.4) {
                        ctx.beginPath(); ctx.moveTo(footX, footY);
                        ctx.lineTo(footX + Math.cos(footAngle + a) * 6, footY + Math.sin(footAngle + a) * 6);
                        ctx.stroke();
                    }
                    ctx.restore();
                });
            }

            darkenColor(hex, percent) {
                const num = parseInt(hex.replace('#', ''), 16), amt = Math.round(2.55 * percent),
                    R = (num >> 16) - amt, G = (num >> 8 & 0x00FF) - amt, B = (num & 0x0000FF) - amt;
                return "#" + (0x1000000 + (R < 255 ? R < 0 ? 0 : R : 255) * 0x10000 + (G < 255 ? G < 0 ? 0 : G : 255) * 0x100 + (B < 255 ? B < 0 ? 0 : B : 255)).toString(16).slice(1);
            }

            die() {
                this.segments.forEach((seg, i) => { if (i % 2 === 0) foods.push(new Food(seg.x, seg.y, 1, this.color)); });
                if (this.isBot) {
                    bots = bots.filter(b => b.id !== this.id);
                    setTimeout(() => bots.push(new Lizard(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, COLORS[Math.floor(Math.random()*COLORS.length)], true)), 2000);
                }
            }

            onCollision() {
                if (this.invincible) return;
                if (this.segments.length <= 10) { if (!this.isBot) gameOver(); else this.die(); return; }
                const cutLength = Math.floor(this.segments.length / 2);
                const removed = this.segments.splice(this.segments.length - cutLength, cutLength);
                removed.forEach((seg, i) => { if (i % 2 === 0) foods.push(new Food(seg.x, seg.y, 2, this.color)); spawnParticles(seg.x, seg.y, this.color, 2); });
                this.targetLength = this.segments.length; this.score = Math.floor(this.score / 2);
                this.invincible = true; if (!this.isBot) triggerScreenShake();
                setTimeout(() => this.invincible = false, 1500);
            }
        }

        // --- WORLD ---
        let player = new Lizard(WORLD_SIZE / 2, WORLD_SIZE / 2, '#78e08f');
        let foods = [], bots = [], shake = 0;

        function init() {
            foods = []; for (let i = 0; i < FOOD_COUNT; i++) foods.push(new Food());
            bots = []; for (let i = 0; i < 6; i++) bots.push(new Lizard(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, COLORS[i%COLORS.length], true));
            dustParticles = []; for(let i=0; i<80; i++) dustParticles.push({x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, s: Math.random()*2});

            window.addEventListener('resize', resize); resize();

            // Desktop Mouse
            window.addEventListener('mousemove', e => { if (Object.keys(activeTouches).length === 0) { mouseX = e.clientX; mouseY = e.clientY; } });

            // Robust Multi-touch
            const joystickBaseEl = document.getElementById('joystick-base');
            const joystickKnobEl = document.getElementById('joystick-knob');
            const boostBtn = document.getElementById('boost-btn');

            canvas.addEventListener('touchstart', e => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    // Skip if it's over the boost button (handled separately)
                    const bRect = boostBtn.getBoundingClientRect();
                    if (t.clientX >= bRect.left && t.clientX <= bRect.right && t.clientY >= bRect.top && t.clientY <= bRect.bottom) continue;

                    if (joystickTouchId === null) {
                        joystickTouchId = t.identifier;
                        activeTouches[t.identifier] = { startX: t.clientX, startY: t.clientY };
                        joystickBaseEl.style.display = 'block';
                        joystickBaseEl.style.left = t.clientX + 'px';
                        joystickBaseEl.style.top = t.clientY + 'px';
                        joystickKnobEl.style.transform = `translate(-50%, -50%)`;
                    }
                }
            }, { passive: false });

            window.addEventListener('touchmove', e => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.identifier === joystickTouchId) {
                        const start = activeTouches[t.identifier];
                        let dx = t.clientX - start.startX;
                        let dy = t.clientY - start.startY;
                        const d = Math.sqrt(dx*dx + dy*dy);
                        const limit = 40;
                        if (d > limit) { dx = (dx/d)*limit; dy = (dy/d)*limit; }
                        joystickKnobEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        mouseX = width/2 + dx * 15; mouseY = height/2 + dy * 15;
                    }
                }
            }, { passive: false });

            window.addEventListener('touchend', e => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.identifier === joystickTouchId) {
                        joystickTouchId = null;
                        delete activeTouches[t.identifier];
                        joystickBaseEl.style.display = 'none';
                    }
                }
            });

            boostBtn.addEventListener('touchstart', e => { e.preventDefault(); isBoosting = true; }, { passive: false });
            boostBtn.addEventListener('touchend', e => { isBoosting = false; });

            window.addEventListener('keydown', e => { if (e.code === 'Space') isBoosting = true; });
            window.addEventListener('keyup', e => { if (e.code === 'Space') isBoosting = false; });
            document.getElementById('restart-btn').onclick = () => location.reload();

            requestAnimationFrame(loop);
        }

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; miniCanvas.width = 110; miniCanvas.height = 110; }
        function spawnParticles(x, y, color, count=5) { for (let i=0; i<count; i++) particles.push({ x, y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 1.0, color, size: Math.random()*3+2 }); }
        function triggerScreenShake() { shake = 15; }

        function loop() {
            if (!gameActive) return;
            const now = Date.now();
            const dt = 16.6; 
            const targetX = player.x + (mouseX - width / 2);
            const targetY = player.y + (mouseY - height / 2);
            player.update(targetX, targetY, dt);

            bots.forEach(bot => {
                let nearestF = null, minD = 400;
                foods.forEach(f => { const d = dist(bot.x, bot.y, f.x, f.y); if(d < minD) { minD = d; nearestF = f; } });
                let tx = nearestF ? nearestF.x : WORLD_SIZE/2, ty = nearestF ? nearestF.y : WORLD_SIZE/2;
                if (dist(bot.x, bot.y, player.x, player.y) < 250) { const angle = Math.atan2(bot.y - player.y, bot.x - player.x); tx = bot.x + Math.cos(angle)*150; ty = bot.y + Math.sin(angle)*150; }
                bot.update(tx, ty, dt);
            });

            const all = [player, ...bots];
            all.forEach(liz => {
                const head = liz.segments[0];
                for (let i = foods.length-1; i>=0; i--) {
                    const f = foods[i];
                    if (dist(head.x, head.y, f.x, f.y) < (liz.baseSize*1.5 + f.radius)) {
                        liz.score += f.value; liz.targetLength += f.value === 1 ? 1 : 2;
                        foods.splice(i, 1); foods.push(new Food());
                        if (liz === player) spawnParticles(f.x, f.y, f.color, 2);
                    }
                }
                all.forEach(other => {
                    if (liz === other) return;
                    for (let i=0; i<other.segments.length; i+=3) { if (dist(head.x, head.y, other.segments[i].x, other.segments[i].y) < 18) { liz.onCollision(); break; } }
                });
            });

            ctx.fillStyle = '#0a140a'; ctx.fillRect(0, 0, width, height);
            ctx.save();
            if (shake > 0) { ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); shake *= 0.9; }
            ctx.translate(width / 2 - player.x, height / 2 - player.y);
            ctx.strokeStyle = 'rgba(120, 224, 143, 0.03)'; ctx.lineWidth = 1;
            for (let x = 0; x <= WORLD_SIZE; x += 150) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_SIZE); ctx.stroke(); }
            for (let y = 0; y <= WORLD_SIZE; y += 150) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WORLD_SIZE, y); ctx.stroke(); }
            ctx.strokeStyle = '#eb2f06'; ctx.lineWidth = 8; ctx.globalAlpha = dist(player.x, player.y, WORLD_SIZE/2, WORLD_SIZE/2) > WORLD_SIZE/2 - 200 ? 1.0 : 0.2;
            ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE); ctx.globalAlpha = 1.0;
            ctx.fillStyle = "rgba(255,255,255,0.1)"; dustParticles.forEach(d => ctx.fillRect(d.x, d.y, d.s, d.s));
            foods.forEach(f => f.draw(ctx, now)); bots.forEach(b => b.draw(ctx, now)); player.draw(ctx, now);
            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            particles = particles.filter(p => p.life > 0); ctx.globalAlpha = 1.0; ctx.restore();

            document.getElementById('score').innerText = player.score; document.getElementById('length').innerText = player.segments.length;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('time').innerText = `${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;
            miniCtx.fillStyle = 'rgba(0,0,0,0.8)'; miniCtx.fillRect(0, 0, 110, 110);
            const s = 110 / WORLD_SIZE;
            miniCtx.fillStyle = 'rgba(255,255,255,0.2)'; foods.forEach(f => miniCtx.fillRect(f.x*s, f.y*s, 1, 1));
            miniCtx.fillStyle = '#ff6b6b'; bots.forEach(b => miniCtx.fillRect(b.x*s, b.y*s, 3, 3));
            miniCtx.fillStyle = '#78e08f'; miniCtx.fillRect(player.x*s, player.y*s, 5, 5);
            miniCtx.strokeStyle = 'rgba(255,255,255,0.4)'; miniCtx.strokeRect((player.x - width/2)*s, (player.y - height/2)*s, width*s, height*s);
            requestAnimationFrame(loop);
        }
        function gameOver() { gameActive = false; document.getElementById('game-over').style.display = 'flex'; document.getElementById('final-score').innerText = player.score; }
        init();
    </script>
</body>
</html>
