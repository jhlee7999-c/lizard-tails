<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lizard.io</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #1a1a1a;
        font-family: sans-serif;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        pointer-events: none;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <div>Score: <span id="score">0</span></div>
    </div>

    <div id="startOverlay">
      <div class="menu-box">
        <h1>Lizard.io</h1>
        <input type="text" id="nickname" placeholder="Enter Nickname" maxlength="15">
        <button id="startBtn">Play Game</button>
        <div class="controls-hint">
          <p>Mouse: Move</p>
          <p>Space: Boost (Costs tail)</p>
        </div>
      </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <style>
      #startOverlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        color: white;
      }
      .menu-box {
        background: #2d5a2d;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 0 30px rgba(0,255,0,0.2);
        border: 4px solid #55aa55;
      }
      h1 { font-size: 4rem; margin-bottom: 20px; color: #55aa55; }
      input {
        display: block; width: 100%; padding: 10px; margin-bottom: 20px;
        background: #1a1a1a; border: 2px solid #55aa55; color: white;
        font-size: 1.2rem; border-radius: 5px; box-sizing: border-box;
      }
      #startBtn {
        width: 100%; padding: 15px; font-size: 1.5rem;
        background: #55aa55; border: none; color: white;
        cursor: pointer; border-radius: 5px; font-weight: bold;
      }
      #startBtn:hover { background: #66cc66; }
      .controls-hint { margin-top: 20px; font-size: 0.9rem; opacity: 0.7; }
    </style>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
